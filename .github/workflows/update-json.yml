name: Daily MasterLog JSON Refresh

on:
  schedule:
    - cron: "0 15 * * *"   # Runs at 15:00 (3pm) GMT every day
  workflow_dispatch:        # Allows manual runs from GitHub Actions tab

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl

      - name: Run JSON export script
        run: |
          python export_MasterLog_to_JSON.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add MasterLog.json
          git commit -m "Automated update of MasterLog.json" || echo "No changes to commit"
          git push
